<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华雄模拟器</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            position: relative;
        }
        /* 关羽和华佗横板大图全页背景 */
        .bg-hero {
            position: fixed;
            left: 0; top: 0; right: 0; bottom: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-hero img {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            opacity: 0.45;
            min-width: 100vw;
            min-height: 100vh;
            max-width: none;
            max-height: none;
            user-select: none;
        }
        .container {
            max-width: 400px;
            margin: 60px auto;
            background: rgba(255,255,255,0.55);
            border-radius: 16px;
            box-shadow: 0 2px 18px #0002;
            padding: 36px 32px 32px 32px;
            position: relative;
            z-index: 1;
        }
        h2 { text-align: center; color: #2d3436; }
        label { display: block; margin-bottom: 8px; color: #636e72; }
        input[type="number"] { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #b2bec3; margin-bottom: 16px; font-size: 1rem; background: rgba(255,255,255,0.9); }
        button {
            width: 100%;
            padding: 10px;
            background: #0984e3;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            opacity: 0.55;
        }
        button:hover {
            background: #74b9ff;
            opacity: 0.88;
        }
        .result {
            margin-top: 24px;
            background: rgba(223,249,251,0.92);
            border-radius: 8px;
            padding: 16px;
            color: #222f3e;
            font-size: 1.1rem;
            text-align: center;
            position: relative;
        }
        .huaxiong-img {
            display: block;
            margin: 18px auto 0 auto;
            max-width: 220px;
            max-height: 220px;
            border-radius: 16px;
            box-shadow: 0 4px 16px #0002;
            background: #fff8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>华雄模拟器</h2>
        <form id="simForm">
            <label for="huaxiong">初始华雄数量：</label>
            <input type="number" id="huaxiong" name="huaxiong" min="1" max="10000" value="100" required>
            <label for="killTime">关羽杀一只华雄耗时：</label>
            <input type="number" id="killTime" name="killTime" min="1" max="1000" value="10" required>
            <label for="cureTime">华佗救一只华雄耗时：</label>
            <input type="number" id="cureTime" name="cureTime" min="1" max="1000" value="15" required>
            <button type="submit">开始模拟</button>
        </form>
        <div class="result" id="result" style="display:none;"></div>
    </div>
    <!-- 置底关羽和华佗横板大图全页背景，建议16:9比例，图片名hero.png -->
    <div class="bg-hero">
        <img src="hero.png" alt="关羽与华佗Q版横板大图" id="hero-img" />
    </div>
    <script src="sim.js"></script>
</body>
</html>
